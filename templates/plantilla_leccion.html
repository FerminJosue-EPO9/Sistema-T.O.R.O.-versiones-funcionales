<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA TORO - Completar Camino</title>
    <style>
        /* Aquí van todos tus estilos (los que estaban en tu ejemplo) */
        /* Los he copiado exactamente */
        :root { --primary: #008080; --bg: #f4f4f9; }
        html { font-size: 16px; }
        @media (max-width: 768px) { html { font-size: 13px; } body { padding: 0.5rem; } .container { padding: 0.8rem; } }
        @media (max-width: 480px) { html { font-size: 10px; } }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 1.2rem; margin: 0; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; margin-bottom: 1.2rem; border-bottom: 2px solid #ddd; }
        .tab { padding: 0.8rem 1.2rem; cursor: pointer; background: #eee; border-radius: 8px 8px 0 0; margin-right: 0.3rem; font-weight: bold; flex: 1; text-align: center; }
        .tab.active { background: var(--primary); color: white; }
        .section { display: none; }
        .section.active { display: block; }
        .contenido-estudio { display: flex; flex-direction: column; gap: 1.8rem; background: #fefefe; padding: 0.5rem 0; }
        .contenido-estudio img, .contenido-estudio video, .contenido-estudio iframe, .contenido-estudio audio { width: 100%; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .contenido-estudio img { height: auto; object-fit: contain; }
        .contenido-estudio video { aspect-ratio: 16 / 9; background: #000; }
        .contenido-estudio iframe { height: 70vh; min-height: 400px; border: 1px solid #ccc; }
        .contenido-estudio audio { display: block; margin: 0.5rem 0; background: #f0f0f0; border-radius: 30px; height: 54px; }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
        @media (max-width: 600px) { .quiz-grid { grid-template-columns: 1fr; } }
        .scroll-area { max-height: 20rem; overflow-y: auto; padding: 0.6rem; border: 1px solid #eee; border-radius: 8px; background: #fafafa; }
        .item { background: white; margin-bottom: 0.6rem; padding: 0.8rem; border-radius: 8px; cursor: pointer; border: 2px solid #ccc; transition: 0.2s; font-size: 1.1rem; }
        .item:hover { border-color: var(--primary); }
        .item.selected { border: 2px solid #007bff; background: #e7f1ff; }
        .item.correct { background: #d4edda; border-color: #28a745; pointer-events: none; }
        .item.wrong { background: #f8d7da; border-color: #dc3545; }
        #game-board { position: relative; margin: 1.5rem auto; background: transparent; border-radius: 1.5rem; padding: 0.75rem; border: none; box-sizing: content-box; overflow-x: auto; }
        .casilla { position: absolute; background-image: url('oak2.jpg'); background-size: cover; background-position: center; border-radius: 8px; transition: opacity 0.5s ease-in-out; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .oculta { opacity: 0; pointer-events: none; }
        #rana { position: absolute; z-index: 10; transition: left 0.6s ease, top 0.6s ease; }
        .saltando { animation: jump 0.6s ease-in-out; }
        @keyframes jump { 0%,100% { transform: scale(1) translateY(0); } 50% { transform: scale(1.3) translateY(-20px); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="showTab('lectura', event)">CONTENIDO</div>
            <div class="tab" onclick="showTab('quiz', event)">ACTIVIDAD</div>
        </div>
        <div id="lectura" class="section active">
            <h3 style="margin-top:0;">Contenido de estudio:</h3>
            <div class="contenido-estudio">
                <!-- AQUÍ SE INYECTARÁN LAS ETIQUETAS MULTIMEDIA -->
                {{ ARCHIVOS_MULTIMEDIA }}
                <p>Fin del contenido.</p>
            </div>
        </div>
        <div id="quiz" class="section">
            <h2 style="text-align: center; font-size: 1.4rem;">Relaciona los conceptos</h2>
            <div class="quiz-grid">
                <div class="scroll-area" id="izquierda"></div>
                <div class="scroll-area" id="derecha"></div>
            </div>
            <div id="game-board">
                <img src="rana_quieto.png" id="rana">
            </div>
        </div>
    </div>
    <script>
        // ========== DATOS DE LA ACTIVIDAD SELECCIONADA ==========
        {{ IZQUIERDA_ARRAY }}
        {{ DERECHA_ARRAY }}
        {{ RESPUESTAS_OBJ }}

        let seleccionIzq = null;
        let aciertos = 0;
        let pasoActual = 0;
        const coordsMap = [];
        const casillasDOM = [];
        const cellRem = 4.5;
        const gapRem = 0.75;

        function mezclarArreglo(arreglo) {
            for (let i = arreglo.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arreglo[i], arreglo[j]] = [arreglo[j], arreglo[i]];
            }
            return arreglo;
        }

        function iniciarTablero() {
            const board = document.getElementById("game-board");
            const totalCasillas = izquierda.length + 1;
            const MAX_COLS = 6;
            let maxY = 0;
            board.style.width = ((MAX_COLS * cellRem) + ((MAX_COLS - 1) * gapRem)) + "rem";
            const rana = document.getElementById("rana");
            rana.style.width = cellRem + "rem";
            rana.style.height = cellRem + "rem";

            for (let i = 0; i < totalCasillas; i++) {
                const ciclo = MAX_COLS + 1;
                const numCiclo = Math.floor(i / ciclo);
                const posEnCiclo = i % ciclo;
                let x, y;
                const filaEsHaciaDerecha = numCiclo % 2 === 0;
                if (posEnCiclo < MAX_COLS) {
                    y = numCiclo * 2;
                    x = filaEsHaciaDerecha ? posEnCiclo : (MAX_COLS - 1) - posEnCiclo;
                } else {
                    y = numCiclo * 2 + 1;
                    x = filaEsHaciaDerecha ? (MAX_COLS - 1) : 0;
                }
                if (y > maxY) maxY = y;
                const posX = x * (cellRem + gapRem);
                const posY = y * (cellRem + gapRem);
                coordsMap.push({ x: posX, y: posY });
                const div = document.createElement("div");
                div.className = "casilla";
                if (i !== 0 && i !== totalCasillas - 1) div.classList.add("oculta");
                div.style.width = cellRem + "rem";
                div.style.height = cellRem + "rem";
                div.style.left = posX + "rem";
                div.style.top = posY + "rem";
                board.appendChild(div);
                casillasDOM.push(div);
            }
            board.style.height = (((maxY + 1) * cellRem) + (maxY * gapRem)) + "rem";
            actualizarRana(0);
        }

        function renderItems() {
            const colIzq = document.getElementById("izquierda");
            const colDer = document.getElementById("derecha");
            const izqMezclada = mezclarArreglo([...izquierda]);
            const derMezclada = mezclarArreglo([...derecha]);

            izqMezclada.forEach(texto => {
                const div = document.createElement("div");
                div.className = "item";
                div.innerText = texto;
                div.onclick = () => seleccionarIzquierda(div, texto);
                colIzq.appendChild(div);
            });
            derMezclada.forEach(texto => {
                const div = document.createElement("div");
                div.className = "item";
                div.innerText = texto;
                div.onclick = () => seleccionarDerecha(div, texto);
                colDer.appendChild(div);
            });
        }

        function seleccionarIzquierda(div, texto) {
            document.querySelectorAll("#izquierda .item").forEach(i => i.classList.remove("selected"));
            div.classList.add("selected");
            seleccionIzq = { div, texto };
        }

        function seleccionarDerecha(divDer, textoDer) {
            if (!seleccionIzq) return;
            if (respuestas[seleccionIzq.texto] === textoDer) {
                seleccionIzq.div.classList.add("correct");
                divDer.classList.add("correct");
                aciertos++;
                pasoActual++;
                if (casillasDOM[pasoActual]) casillasDOM[pasoActual].classList.remove("oculta");
                actualizarRana(pasoActual);
            } else {
                const dIzq = seleccionIzq.div;
                dIzq.classList.add("wrong");
                divDer.classList.add("wrong");
                setTimeout(() => {
                    dIzq.classList.remove("wrong", "selected");
                    divDer.classList.remove("wrong");
                }, 500);
            }
            seleccionIzq = null;
        }

        function actualizarRana(paso) {
            const rana = document.getElementById("rana");
            const coords = coordsMap[paso];
            if (!coords) return;
            rana.classList.add("saltando");
            rana.src = "rana_salto.gif";
            rana.style.left = coords.x + "rem";
            rana.style.top = coords.y + "rem";
            setTimeout(() => {
                rana.classList.remove("saltando");
                rana.src = "rana_quieto.png";
            }, 600);
        }

        function showTab(id, event) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        window.onload = () => {
            iniciarTablero();
            renderItems();
        };
    </script>
</body>
</html>
