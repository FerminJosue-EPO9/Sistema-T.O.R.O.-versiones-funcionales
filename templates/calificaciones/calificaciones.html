{% extends "layout.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='calificaciones.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='lectura.css') }}">

<div id="contenidoPrincipal" class="contenido-principal-cal">

    <!-- Los datos del servidor se inyectan aquí para que el JS los lea -->
    <script id="datos-servidor" type="application/json">
    {
        "context_key": {{ context_key | tojson }},
        "nombre_grupo": {{ nombre_grupo | tojson }},
        "nombre_materia": {{ nombre_materia | tojson }},
        "nombre_parcial": {{ nombre_parcial | tojson }},
        "alumnos": {{ alumnos | tojson }},
        "calificaciones": {{ calificaciones_json | safe }}
    }
    </script>

    <!-- El JS construye todo el contenido aquí -->
</div>

<script src="{{ url_for('static', filename='js/calificaciones_lectura.js') }}"></script>
{% endblock %}
