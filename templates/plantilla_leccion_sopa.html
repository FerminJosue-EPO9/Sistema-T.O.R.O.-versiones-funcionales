<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA TORO - Sopa de letras</title>
    <style>
        :root { --primary: #008080; --bg: #f4f4f9; }
        html { font-size: 16px; }
        @media (max-width: 768px) { html { font-size: 13px; } body { padding: 0.5rem; } .container { padding: 0.8rem; } }
        @media (max-width: 480px) { html { font-size: 10px; } }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 1.2rem; margin: 0; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; margin-bottom: 1.2rem; border-bottom: 2px solid #ddd; }
        .tab { padding: 0.8rem 1.2rem; cursor: pointer; background: #eee; border-radius: 8px 8px 0 0; margin-right: 0.3rem; font-weight: bold; flex: 1; text-align: center; }
        .tab.active { background: var(--primary); color: white; }
        .section { display: none; }
        .section.active { display: block; }
        .contenido-estudio { display: flex; flex-direction: column; gap: 1.8rem; background: #fefefe; padding: 0.5rem 0; }
        .contenido-estudio iframe { width: 100%; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); height: 70vh; min-height: 400px; border: 1px solid #ccc; }
        .contenido-estudio p { text-align: center; color: #666; margin: 1rem 0 0; }
        .quiz-grid { display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 50px; margin-bottom: 10px; text-align: center; }
        h3 { font-size: 35px; }
        #grid { display: grid; grid-template-columns: repeat(20, 1fr); gap: 3px; width: 100%; max-width: 500px; }
        .cell { aspect-ratio: 1/1; background: white; border: 2px solid #ccc; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; font-weight: bold; border-radius: 8px; user-select: none; cursor: pointer; transition: 0.2s; }
        .cell.selected { background: #4da6ff; color: white; }
        .cell.found { background: #32cd32; color: white; }
        #words { margin-top: 20px; background: white; padding: 15px; border-radius: 10px; width: 100%; max-width: 500px; box-sizing: border-box; }
        .found-word { text-decoration: line-through; color: green; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="tabs">
        <div class="tab active" onclick="showTab('lectura', event)">CONTENIDO</div>
        <div class="tab" onclick="showTab('quiz', event)">ACTIVIDAD</div>
    </div>
    <div id="lectura" class="section active">
        <h3 style="margin-top:0;">Contenido de estudio:</h3>
        <div class="contenido-estudio">
            {{ ARCHIVOS_MULTIMEDIA }}
            <p>Fin del contenido.</p>
        </div>
    </div>
    <div id="quiz" class="section">
        <h2 style="text-align: center; font-size: 1.4rem;">Sopa de letras</h2>
        <div class="quiz-grid">
            <div id="grid"></div>
            <div id="words">
                <h3>Conceptos</h3>
                <div id="word-list"></div>
            </div>
        </div>
    </div>
</div>
<script>
    function showTab(id, event) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // Datos inyectados desde el servidor
    const wordsData = {{ PREGUNTAS_JSON }};

    // Construimos el array de palabras y pistas
    const words = wordsData.map(item => ({
        word: item.palabra,
        clue: item.texto
    }));

    // El resto del código del juego (igual que en el ejemplo, pero usando la variable words)
    const grid = document.getElementById("grid");
    const size = 20;
    let aciertos = 0;

    const wordList = document.getElementById("word-list");
    words.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item.clue;
        li.id = item.word;
        wordList.appendChild(li);
    });

    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let board = [];
    let selectedLetters = "";
    let selectedCells = [];
    let selectedPositions = [];

    for (let i = 0; i < size; i++) {
        board[i] = [];
        for (let j = 0; j < size; j++) {
            board[i][j] = "";
        }
    }

    const directions = [
        { row: 0, col: 1 },
        { row: 1, col: 0 },
        { row: 1, col: 1 }
    ];

    const wordPlacements = [];

    words.forEach(item => {
        const word = item.word;
        let placed = false;
        while (!placed) {
            const direction = directions[Math.floor(Math.random() * directions.length)];
            const row = Math.floor(Math.random() * size);
            const col = Math.floor(Math.random() * size);
            let canPlace = true;
            const positions = [];
            for (let i = 0; i < word.length; i++) {
                const newRow = row + direction.row * i;
                const newCol = col + direction.col * i;
                if (newRow >= size || newCol >= size) {
                    canPlace = false;
                    break;
                }
                if (board[newRow][newCol] !== "") {
                    canPlace = false;
                    break;
                }
                positions.push({ row: newRow, col: newCol, letter: word[i] });
            }
            if (canPlace) {
                positions.forEach(pos => { board[pos.row][pos.col] = pos.letter; });
                wordPlacements.push({ word: word, positions: positions });
                placed = true;
            }
        }
    });

    for (let i = 0; i < size; i++) {
        for (let j = 0; j < size; j++) {
            if (board[i][j] === "") {
                board[i][j] = alphabet[Math.floor(Math.random() * alphabet.length)];
            }
        }
    }

    for (let i = 0; i < size; i++) {
        for (let j = 0; j < size; j++) {
            const cell = document.createElement("div");
            cell.classList.add("cell");
            cell.textContent = board[i][j];
            cell.dataset.row = i;
            cell.dataset.col = j;
            cell.addEventListener("click", () => {
                if (cell.classList.contains("found")) return;
                cell.classList.toggle("selected");
                if (cell.classList.contains("selected")) {
                    selectedLetters += cell.textContent;
                    selectedCells.push(cell);
                    selectedPositions.push({ row: i, col: j });
                } else {
                    const index = selectedCells.indexOf(cell);
                    selectedCells.splice(index, 1);
                    selectedPositions.splice(index, 1);
                }
                checkWord();
            });
            grid.appendChild(cell);
        }
    }

    function checkWord() {
        const correctWord = wordPlacements.find(place => {
            if (place.positions.length !== selectedPositions.length) return false;
            return place.positions.every((pos, index) => {
                return pos.row === selectedPositions[index].row && pos.col === selectedPositions[index].col;
            });
        });
        if (correctWord) {
            selectedCells.forEach(cell => {
                cell.classList.remove("selected");
                cell.classList.add("found");
                cell.style.pointerEvents = "none";
            });
            document.getElementById(correctWord.word).classList.add("found-word");
            aciertos++;
            selectedLetters = "";
            selectedCells = [];
            selectedPositions = [];
            return;
        }
        const possible = wordPlacements.some(place => {
            return selectedPositions.every((pos, index) => {
                if (!place.positions[index]) return false;
                return pos.row === place.positions[index].row && pos.col === place.positions[index].col;
            });
        });
        if (!possible && selectedCells.length > 0) {
            setTimeout(() => { clearSelection(); }, 1000);
        }
    }

    function clearSelection() {
        selectedCells.forEach(cell => { cell.classList.remove("selected"); });
        selectedLetters = "";
        selectedCells = [];
        selectedPositions = [];
    }
</script>
</body>
</html>
